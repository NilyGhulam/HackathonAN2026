{% extends "base.html" %}
{% block title %}AgorIA — Cartographier le débat public{% endblock %}
{% block content %}
<section class="entry-map" data-entry-map>
  <script type="application/json" data-entry-map-data>{{ debate_subjects|tojson }}</script>

  <header class="entry-map-head">
    <div>
      <p class="eyebrow">Cartographie interactive du débat public</p>
      <h1>Explorez le débat public.</h1>
    </div>
    <div class="entry-search">
      <label for="entry-search">Recherche directe</label>
      <div class="search-row">
        <input id="entry-search" type="search" placeholder="Recours, indicateurs, formation..." data-entry-search>
        <button class="button" type="button" data-entry-search-button>Rechercher</button>
      </div>
      <div class="search-results" data-entry-search-results aria-live="polite"></div>
    </div>
  </header>

  <div class="map-stage" data-map-stage>
    <div class="mind-map" data-mind-map aria-live="polite">
      <div class="mind-center">
        <h2 data-map-title>Débat public</h2>
      </div>
      <div class="mind-nodes" data-map-nodes></div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
  <script src="/static/entry-map.js" defer></script>
{% endblock %}
